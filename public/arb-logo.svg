<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD62B" />
      <stop offset="100%" stop-color="#FF9D0A" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" ry="120" fill="url(#bgGrad)" />
  
  <g fill="#FFFDF5" filter="url(#shadow)">
    <!-- Right overlapping leg -->
    <path d="M256 120 L390 390 L310 390 L233 240 Z" />
    
    <!-- Left leg folding into horizontal crossbar -->
    <!-- From bottom left, up to overlap top apex, then right to intersect right leg, then angle down -->
    <path d="M120 390 L220 180 L256 120 L320 250 L250 250 L185 390 Z" />
  </g>
</svg>
